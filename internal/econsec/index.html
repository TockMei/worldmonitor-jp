<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>経済安全保障ソースマップ | worldmonitor internal</title>
    <meta name="robots" content="noindex, nofollow" />
    <script type="module" src="/src/econsec/main.ts"></script>
  </head>
  <body>
    <div class="econsec-page">
      <header class="econsec-header">
        <h1>経済安全保障ソースマップ</h1>
        <span class="internal-mark">INTERNAL ONLY</span>
        <span id="econsec-meta"></span>
      </header>

      <section id="econsec-alerts-panel" class="econsec-alerts-panel"></section>

      <section class="econsec-top">
        <div id="econsec-map" class="econsec-map"></div>
        <div id="live-news" class="econsec-video"></div>
      </section>

      <nav id="econsec-tabs" class="econsec-tabs"></nav>

      <div class="econsec-filters">
        <label>region <select id="econsec-filter-region"></select></label>
        <label>category <select id="econsec-filter-category"></select></label>
        <label>cost <select id="econsec-filter-cost"></select></label>
        <input id="econsec-search" type="search" placeholder="検索（名称・notes・URL）" />
        <span id="econsec-count"></span>
      </div>

      <main id="econsec-list"></main>
    </div>
  </body>
</html>
