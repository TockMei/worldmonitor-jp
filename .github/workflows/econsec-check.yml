name: econsec-liveness-check

on:
  schedule:
    # Monday 06:30 JST = Sunday 21:30 UTC
    # (kept clear of the existing daily-report at 07:00 JST)
    - cron: '30 21 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run liveness checker
        run: node scripts/econsec-check.mjs

      - name: Commit updated sources.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/econsec/sources.json
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: weekly econsec liveness check ($(date -u +%Y-%m-%d))"
            git push
          fi
